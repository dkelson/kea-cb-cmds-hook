name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      kea_repository:
        description: Kea repository to test against
        required: true
        default: isc-projects/kea
      kea_ref:
        description: Kea branch, tag, or commit to test against
        required: true
        default: 1f5fdcac1a3d73078bff24a7d4b46520b580f60f

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out hook
        uses: actions/checkout@v6

      - name: Check overlay scripts
        run: |
          sh -n scripts/apply-overlay.sh
          sh -n scripts/build-rpm.sh
          sh -n scripts/build-rpm-almalinux.sh
          sh -n scripts/run-tests.sh

      - name: Check API coverage script syntax
        run: |
          python3 -m py_compile src/hooks/dhcp/cb_cmds/tests/api_coverage.py
          python3 -m py_compile scripts/arm_conformance.py

  kea-overlay:
    runs-on: ubuntu-latest
    env:
      KEA_REPOSITORY: ${{ inputs.kea_repository || 'isc-projects/kea' }}
      KEA_REF: ${{ inputs.kea_ref || '1f5fdcac1a3d73078bff24a7d4b46520b580f60f' }}
      CC: clang
      CXX: clang++
    steps:
      - name: Check out hook
        uses: actions/checkout@v6
        with:
          path: hook

      - name: Check out Kea
        uses: actions/checkout@v6
        with:
          repository: ${{ env.KEA_REPOSITORY }}
          ref: ${{ env.KEA_REF }}
          path: kea

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            clang \
            flex \
            gawk \
            libboost-all-dev \
            libgtest-dev \
            libkrb5-dev \
            liblog4cplus-dev \
            libssl-dev \
            ninja-build \
            pkg-config \
            python3-venv

      - name: Install Meson
        run: |
          python3 -m venv .ci-meson
          .ci-meson/bin/python -m pip install --upgrade pip
          .ci-meson/bin/python -m pip install meson==1.11.1
          echo "$PWD/.ci-meson/bin" >> "$GITHUB_PATH"
          .ci-meson/bin/meson --version

      - name: Apply hook overlay
        env:
          KEA_CB_CMDS_SKIP_DOCS: "1"
        run: |
          hook/scripts/apply-overlay.sh kea

      - name: Configure Kea
        timeout-minutes: 10
        run: |
          meson setup kea/build kea \
            --wrap-mode=nofallback \
            -Dtests=enabled \
            -Dcpp_std=c++17 \
            -Dcrypto=openssl \
            -Dkrb5=disabled \
            -Dmysql=disabled \
            -Dnetconf=disabled \
            -Dpostgresql=disabled

      - name: Build cb_cmds tests
        timeout-minutes: 20
        run: |
          meson compile -C kea/build \
            dhcp-cb-cmds-tests \
            dhcp-cb-cmds-libload-tests

      - name: Run cb_cmds tests
        timeout-minutes: 10
        run: |
          meson test -C kea/build \
            dhcp-cb-cmds-tests \
            dhcp-cb-cmds-libload-tests \
            dhcp-cb-cmds-api-coverage \
            kea-config-backend-tests \
            --print-errorlogs

  kea-overlay-sanitizer:
    runs-on: ubuntu-latest
    env:
      KEA_REPOSITORY: ${{ inputs.kea_repository || 'isc-projects/kea' }}
      KEA_REF: ${{ inputs.kea_ref || '1f5fdcac1a3d73078bff24a7d4b46520b580f60f' }}
      ASAN_SYMBOLIZER_PATH: /usr/bin/llvm-symbolizer
      CC: clang
      CXX: clang++
    steps:
      - name: Check out hook
        uses: actions/checkout@v6
        with:
          path: hook

      - name: Check out Kea
        uses: actions/checkout@v6
        with:
          repository: ${{ env.KEA_REPOSITORY }}
          ref: ${{ env.KEA_REF }}
          path: kea

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            clang \
            flex \
            gawk \
            libboost-all-dev \
            libgtest-dev \
            libkrb5-dev \
            liblog4cplus-dev \
            libssl-dev \
            llvm \
            ninja-build \
            pkg-config \
            python3-venv

      - name: Install Meson
        run: |
          python3 -m venv .ci-meson
          .ci-meson/bin/python -m pip install --upgrade pip
          .ci-meson/bin/python -m pip install meson==1.11.1
          echo "$PWD/.ci-meson/bin" >> "$GITHUB_PATH"
          .ci-meson/bin/meson --version

      - name: Apply hook overlay
        env:
          KEA_CB_CMDS_SKIP_DOCS: "1"
        run: |
          hook/scripts/apply-overlay.sh kea

      - name: Configure Kea sanitizer build
        timeout-minutes: 10
        run: |
          meson setup kea/build-asan kea \
            --wrap-mode=nofallback \
            -Dtests=enabled \
            -Dcpp_std=c++17 \
            -Db_sanitize=address,undefined \
            -Dcrypto=openssl \
            -Dkrb5=disabled \
            -Dmysql=disabled \
            -Dnetconf=disabled \
            -Dpostgresql=disabled

      - name: Build cb_cmds sanitizer tests
        timeout-minutes: 25
        run: |
          meson compile -C kea/build-asan \
            dhcp-cb-cmds-tests \
            dhcp-cb-cmds-libload-tests

      - name: Run cb_cmds sanitizer tests
        timeout-minutes: 10
        run: |
          hook/scripts/run-tests.sh --leak-check kea/build-asan

  arm-conformance:
    runs-on: ubuntu-latest
    env:
      KEA_REPOSITORY: ${{ inputs.kea_repository || 'isc-projects/kea' }}
      KEA_REF: ${{ inputs.kea_ref || '1f5fdcac1a3d73078bff24a7d4b46520b580f60f' }}
      CC: clang
      CXX: clang++
    steps:
      - name: Check out hook
        uses: actions/checkout@v6
        with:
          path: hook

      - name: Check out Kea
        uses: actions/checkout@v6
        with:
          repository: ${{ env.KEA_REPOSITORY }}
          ref: ${{ env.KEA_REF }}
          path: kea

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            clang \
            flex \
            gawk \
            libboost-all-dev \
            libgtest-dev \
            libkrb5-dev \
            liblog4cplus-dev \
            libpq-dev \
            libssl-dev \
            ninja-build \
            pkg-config \
            postgresql \
            postgresql-client \
            python3-venv

      - name: Start PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -v ON_ERROR_STOP=1 -c "CREATE USER kea WITH PASSWORD 'kea';"
          sudo -u postgres psql -v ON_ERROR_STOP=1 -c "CREATE DATABASE kea OWNER kea;"
          pg_isready -h 127.0.0.1 -p 5432 -U kea -d kea

      - name: Install Meson
        run: |
          python3 -m venv .ci-meson
          .ci-meson/bin/python -m pip install --upgrade pip
          .ci-meson/bin/python -m pip install meson==1.11.1
          echo "$PWD/.ci-meson/bin" >> "$GITHUB_PATH"
          .ci-meson/bin/meson --version

      - name: Apply hook overlay
        env:
          KEA_CB_CMDS_SKIP_DOCS: "1"
        run: |
          hook/scripts/apply-overlay.sh kea

      - name: Configure Kea with PostgreSQL
        timeout-minutes: 10
        run: |
          meson setup kea/build-conformance kea \
            --wrap-mode=nofallback \
            -Dtests=enabled \
            -Dcpp_std=c++17 \
            -Dcrypto=openssl \
            -Dkrb5=disabled \
            -Dmysql=disabled \
            -Dnetconf=disabled \
            -Dpostgresql=enabled

      - name: Build conformance runtime
        timeout-minutes: 25
        run: |
          meson compile -C kea/build-conformance \
            src/hooks/dhcp/cb_cmds/dhcp_cb_cmds.so \
            src/hooks/dhcp/pgsql/dhcp_pgsql.so \
            kea-dhcp4 \
            kea-dhcp6

      - name: Initialize PostgreSQL config backend
        env:
          PGPASSWORD: kea
        run: |
          kea/build-conformance/src/bin/admin/kea-admin db-init pgsql \
            -h 127.0.0.1 \
            -P 5432 \
            -u kea \
            -p kea \
            -n kea \
            -d "$PWD/kea/build-conformance/src/share/database/scripts"

      - name: Run ARM conformance harness
        timeout-minutes: 5
        env:
          CB_PG_HOST: 127.0.0.1
          CB_PG_PORT: "5432"
          CB_PG_NAME: kea
          CB_PG_USER: kea
          CB_PG_PASSWORD: kea
          KEA_BIN4: ${{ github.workspace }}/kea/build-conformance/src/bin/dhcp4/kea-dhcp4
          KEA_BIN6: ${{ github.workspace }}/kea/build-conformance/src/bin/dhcp6/kea-dhcp6
          KEA_HOOKS_DIR: ${{ github.workspace }}/kea/build-conformance/src/hooks/dhcp/cb_cmds
        run: |
          ln -s "$PWD/kea/build-conformance/src/hooks/dhcp/pgsql/libdhcp_pgsql.so" \
            "$PWD/kea/build-conformance/src/hooks/dhcp/cb_cmds/libdhcp_pgsql.so"
          python3 hook/scripts/arm_conformance.py
