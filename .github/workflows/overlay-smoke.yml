name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      kea_repository:
        description: Kea repository to test against
        required: true
        default: isc-projects/kea
      kea_ref:
        description: Kea branch, tag, or commit to test against
        required: true
        default: 1f5fdcac1a3d73078bff24a7d4b46520b580f60f

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out hook
        uses: actions/checkout@v6

      - name: Check overlay scripts
        run: |
          sh -n scripts/apply-overlay.sh
          sh -n scripts/build-rpm.sh
          sh -n scripts/build-rpm-almalinux.sh
          sh -n scripts/run-tests.sh

      - name: Check API coverage script syntax
        run: |
          python3 -m py_compile src/hooks/dhcp/cb_cmds/tests/api_coverage.py
          python3 -m py_compile scripts/arm_conformance.py

  kea-overlay:
    runs-on: ubuntu-latest
    env:
      KEA_REPOSITORY: ${{ inputs.kea_repository || 'isc-projects/kea' }}
      KEA_REF: ${{ inputs.kea_ref || '1f5fdcac1a3d73078bff24a7d4b46520b580f60f' }}
      CC: clang
      CXX: clang++
    steps:
      - name: Check out hook
        uses: actions/checkout@v6
        with:
          path: hook

      - name: Check out Kea
        uses: actions/checkout@v6
        with:
          repository: ${{ env.KEA_REPOSITORY }}
          ref: ${{ env.KEA_REF }}
          path: kea

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            clang \
            flex \
            gawk \
            libboost-all-dev \
            libgtest-dev \
            libkrb5-dev \
            liblog4cplus-dev \
            libssl-dev \
            ninja-build \
            pkg-config \
            python3-venv

      - name: Install Meson
        run: |
          python3 -m venv .ci-meson
          .ci-meson/bin/python -m pip install --upgrade pip
          .ci-meson/bin/python -m pip install meson==1.11.1
          echo "$PWD/.ci-meson/bin" >> "$GITHUB_PATH"
          .ci-meson/bin/meson --version

      - name: Apply hook overlay
        env:
          KEA_CB_CMDS_SKIP_DOCS: "1"
        run: |
          hook/scripts/apply-overlay.sh kea

      - name: Configure Kea
        timeout-minutes: 10
        run: |
          meson setup kea/build kea \
            --wrap-mode=nofallback \
            -Dtests=enabled \
            -Dcpp_std=c++17 \
            -Dcrypto=openssl \
            -Dkrb5=disabled \
            -Dmysql=disabled \
            -Dnetconf=disabled \
            -Dpostgresql=disabled

      - name: Build cb_cmds tests
        timeout-minutes: 20
        run: |
          meson compile -C kea/build \
            dhcp-cb-cmds-tests \
            dhcp-cb-cmds-libload-tests

      - name: Run cb_cmds tests
        timeout-minutes: 10
        run: |
          meson test -C kea/build \
            dhcp-cb-cmds-tests \
            dhcp-cb-cmds-libload-tests \
            dhcp-cb-cmds-api-coverage \
            kea-config-backend-tests \
            --print-errorlogs

  kea-overlay-sanitizer:
    runs-on: ubuntu-latest
    env:
      KEA_REPOSITORY: ${{ inputs.kea_repository || 'isc-projects/kea' }}
      KEA_REF: ${{ inputs.kea_ref || '1f5fdcac1a3d73078bff24a7d4b46520b580f60f' }}
      ASAN_SYMBOLIZER_PATH: /usr/bin/llvm-symbolizer
      CC: clang
      CXX: clang++
    steps:
      - name: Check out hook
        uses: actions/checkout@v6
        with:
          path: hook

      - name: Check out Kea
        uses: actions/checkout@v6
        with:
          repository: ${{ env.KEA_REPOSITORY }}
          ref: ${{ env.KEA_REF }}
          path: kea

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            clang \
            flex \
            gawk \
            libboost-all-dev \
            libgtest-dev \
            libkrb5-dev \
            liblog4cplus-dev \
            libssl-dev \
            llvm \
            ninja-build \
            pkg-config \
            python3-venv

      - name: Install Meson
        run: |
          python3 -m venv .ci-meson
          .ci-meson/bin/python -m pip install --upgrade pip
          .ci-meson/bin/python -m pip install meson==1.11.1
          echo "$PWD/.ci-meson/bin" >> "$GITHUB_PATH"
          .ci-meson/bin/meson --version

      - name: Apply hook overlay
        env:
          KEA_CB_CMDS_SKIP_DOCS: "1"
        run: |
          hook/scripts/apply-overlay.sh kea

      - name: Configure Kea sanitizer build
        timeout-minutes: 10
        run: |
          meson setup kea/build-asan kea \
            --wrap-mode=nofallback \
            -Dtests=enabled \
            -Dcpp_std=c++17 \
            -Db_sanitize=address,undefined \
            -Dcrypto=openssl \
            -Dkrb5=disabled \
            -Dmysql=disabled \
            -Dnetconf=disabled \
            -Dpostgresql=disabled

      - name: Build cb_cmds sanitizer tests
        timeout-minutes: 25
        run: |
          meson compile -C kea/build-asan \
            dhcp-cb-cmds-tests \
            dhcp-cb-cmds-libload-tests

      - name: Run cb_cmds sanitizer tests
        timeout-minutes: 10
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts/sanitizer
          hook/scripts/run-tests.sh --leak-check kea/build-asan 2>&1 \
            | tee ci-artifacts/sanitizer/run-tests.log

      - name: Upload sanitizer results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sanitizer-results
          path: |
            ci-artifacts/sanitizer/
            kea/build-asan/meson-logs/
          if-no-files-found: warn
          retention-days: 30

  arm-conformance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend:
          - postgresql
          - mysql
    env:
      KEA_REPOSITORY: ${{ inputs.kea_repository || 'isc-projects/kea' }}
      KEA_REF: ${{ inputs.kea_ref || '1f5fdcac1a3d73078bff24a7d4b46520b580f60f' }}
      CC: clang
      CXX: clang++
    steps:
      - name: Check out hook
        uses: actions/checkout@v6
        with:
          path: hook

      - name: Check out Kea
        uses: actions/checkout@v6
        with:
          repository: ${{ env.KEA_REPOSITORY }}
          ref: ${{ env.KEA_REF }}
          path: kea

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            clang \
            default-mysql-client \
            default-mysql-server \
            flex \
            gawk \
            libboost-all-dev \
            libgtest-dev \
            libkrb5-dev \
            liblog4cplus-dev \
            libmariadb-dev \
            libpq-dev \
            libssl-dev \
            ninja-build \
            pkg-config \
            postgresql \
            postgresql-client \
            python3-venv

      - name: Start PostgreSQL
        if: matrix.backend == 'postgresql'
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -v ON_ERROR_STOP=1 -c "CREATE USER kea WITH PASSWORD 'kea';"
          sudo -u postgres psql -v ON_ERROR_STOP=1 -c "CREATE DATABASE kea OWNER kea;"
          pg_isready -h 127.0.0.1 -p 5432 -U kea -d kea

      - name: Start MySQL
        if: matrix.backend == 'mysql'
        run: |
          set -euo pipefail
          if systemctl list-unit-files mysql.service >/dev/null 2>&1; then
            mysql_service=mysql.service
          elif systemctl list-unit-files mariadb.service >/dev/null 2>&1; then
            mysql_service=mariadb.service
          else
            systemctl list-unit-files '*mysql*' '*mariadb*'
            echo "No MySQL or MariaDB systemd service found" >&2
            exit 1
          fi

          sudo systemctl start "$mysql_service"
          mysql_root_ping() {
            sudo mysqladmin --protocol=socket -uroot ping >/dev/null 2>&1 ||
              sudo mysqladmin --protocol=socket -uroot --password=root ping >/dev/null 2>&1 ||
              mysqladmin --protocol=tcp --host=127.0.0.1 --port=3306 -uroot --password=root ping >/dev/null 2>&1
          }
          mysql_root() {
            sudo mysql --protocol=socket -uroot "$@" 2>/dev/null ||
              sudo mysql --protocol=socket -uroot --password=root "$@" 2>/dev/null ||
              mysql --protocol=tcp --host=127.0.0.1 --port=3306 -uroot --password=root "$@"
          }

          for _ in {1..30}; do
            if mysql_root_ping; then
              break
            fi
            sleep 1
          done
          mysql_root_ping

          mysql_root -e "CREATE DATABASE IF NOT EXISTS kea;"
          mysql_root -e "DROP USER IF EXISTS 'kea'@'127.0.0.1';"
          mysql_root -e "DROP USER IF EXISTS 'kea'@'localhost';"
          mysql_root -e "CREATE USER 'kea'@'127.0.0.1' IDENTIFIED BY 'kea';"
          mysql_root -e "CREATE USER 'kea'@'localhost' IDENTIFIED BY 'kea';"
          mysql_root -e "GRANT ALL PRIVILEGES ON kea.* TO 'kea'@'127.0.0.1';"
          mysql_root -e "GRANT ALL PRIVILEGES ON kea.* TO 'kea'@'localhost';"
          mysql_root -e "FLUSH PRIVILEGES;"
          for _ in {1..30}; do
            if mysqladmin --protocol=tcp --host=127.0.0.1 --port=3306 --user=kea --password=kea ping >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          mysqladmin --protocol=tcp --host=127.0.0.1 --port=3306 --user=kea --password=kea ping

      - name: Install Meson
        run: |
          python3 -m venv .ci-meson
          .ci-meson/bin/python -m pip install --upgrade pip
          .ci-meson/bin/python -m pip install meson==1.11.1
          echo "$PWD/.ci-meson/bin" >> "$GITHUB_PATH"
          .ci-meson/bin/meson --version

      - name: Apply hook overlay
        env:
          KEA_CB_CMDS_SKIP_DOCS: "1"
        run: |
          hook/scripts/apply-overlay.sh kea

      - name: Configure Kea with ${{ matrix.backend }}
        timeout-minutes: 10
        run: |
          set -euo pipefail
          mysql=disabled
          postgresql=disabled
          if [ "${{ matrix.backend }}" = "mysql" ]; then
            mysql=enabled
          else
            postgresql=enabled
          fi
          meson setup "kea/build-conformance-${{ matrix.backend }}" kea \
            --wrap-mode=nofallback \
            -Dtests=enabled \
            -Dcpp_std=c++17 \
            -Dcrypto=openssl \
            -Dkrb5=disabled \
            -Dmysql="$mysql" \
            -Dnetconf=disabled \
            -Dpostgresql="$postgresql"

      - name: Build conformance runtime
        timeout-minutes: 25
        run: |
          set -euo pipefail
          db_hook=pgsql
          if [ "${{ matrix.backend }}" = "mysql" ]; then
            db_hook=mysql
          fi
          meson compile -C "kea/build-conformance-${{ matrix.backend }}" \
            src/hooks/dhcp/cb_cmds/dhcp_cb_cmds.so \
            "src/hooks/dhcp/$db_hook/dhcp_$db_hook.so" \
            kea-dhcp4 \
            kea-dhcp6

      - name: Initialize PostgreSQL config backend
        if: matrix.backend == 'postgresql'
        env:
          PGPASSWORD: kea
        run: |
          kea/build-conformance-postgresql/src/bin/admin/kea-admin db-init pgsql \
            -h 127.0.0.1 \
            -P 5432 \
            -u kea \
            -p kea \
            -n kea \
            -d "$PWD/kea/build-conformance-postgresql/src/share/database/scripts"

      - name: Initialize MySQL config backend
        if: matrix.backend == 'mysql'
        run: |
          kea/build-conformance-mysql/src/bin/admin/kea-admin db-init mysql \
            -h 127.0.0.1 \
            -P 3306 \
            -u kea \
            -p kea \
            -n kea \
            -d "$PWD/kea/build-conformance-mysql/src/share/database/scripts"

      - name: Run ARM conformance harness
        timeout-minutes: 5
        env:
          CB_DB_TYPE: ${{ matrix.backend }}
          CB_PG_HOST: 127.0.0.1
          CB_PG_PORT: "5432"
          CB_PG_NAME: kea
          CB_PG_USER: kea
          CB_PG_PASSWORD: kea
          CB_MYSQL_HOST: 127.0.0.1
          CB_MYSQL_PORT: "3306"
          CB_MYSQL_NAME: kea
          CB_MYSQL_USER: kea
          CB_MYSQL_PASSWORD: kea
          KEA_BIN4: ${{ github.workspace }}/kea/build-conformance-${{ matrix.backend }}/src/bin/dhcp4/kea-dhcp4
          KEA_BIN6: ${{ github.workspace }}/kea/build-conformance-${{ matrix.backend }}/src/bin/dhcp6/kea-dhcp6
          KEA_HOOKS_DIR: ${{ github.workspace }}/kea/build-conformance-${{ matrix.backend }}/src/hooks/dhcp/cb_cmds
          KEA_CB_CMDS_ARM_CONFORMANCE_RUN_DIR: ${{ github.workspace }}/ci-artifacts/conformance/${{ matrix.backend }}/run
        run: |
          set -euo pipefail
          mkdir -p "ci-artifacts/conformance/${{ matrix.backend }}/run"
          db_hook=pgsql
          if [ "${{ matrix.backend }}" = "mysql" ]; then
            db_hook=mysql
          fi
          ln -sf "$PWD/kea/build-conformance-${{ matrix.backend }}/src/hooks/dhcp/$db_hook/libdhcp_$db_hook.so" \
            "$PWD/kea/build-conformance-${{ matrix.backend }}/src/hooks/dhcp/cb_cmds/libdhcp_$db_hook.so"
          python3 -u hook/scripts/arm_conformance.py 2>&1 \
            | tee "ci-artifacts/conformance/${{ matrix.backend }}/arm-conformance.log"

      - name: Upload ARM conformance results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: arm-conformance-results-${{ matrix.backend }}
          path: ci-artifacts/conformance/${{ matrix.backend }}/
          if-no-files-found: warn
          retention-days: 30
