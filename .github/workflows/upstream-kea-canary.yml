name: upstream-kea-canary

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:
    inputs:
      kea_repository:
        description: Kea repository to test against
        required: true
        default: isc-projects/kea
      kea_ref:
        description: Kea branch, tag, or commit to test against
        required: true
        default: master

jobs:
  canary:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: kea
          POSTGRES_PASSWORD: kea
          POSTGRES_DB: kea
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kea -d kea"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      KEA_REPOSITORY: ${{ inputs.kea_repository || 'isc-projects/kea' }}
      KEA_REF: ${{ inputs.kea_ref || 'master' }}
      CC: clang
      CXX: clang++
    steps:
      - name: Check out hook
        uses: actions/checkout@v6
        with:
          path: hook

      - name: Check out upstream Kea
        uses: actions/checkout@v6
        with:
          repository: ${{ env.KEA_REPOSITORY }}
          ref: ${{ env.KEA_REF }}
          path: kea

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            clang \
            flex \
            gawk \
            libboost-all-dev \
            libgtest-dev \
            libkrb5-dev \
            liblog4cplus-dev \
            libpq-dev \
            libssl-dev \
            ninja-build \
            pkg-config \
            postgresql-client \
            python3-venv

      - name: Install Meson
        run: |
          python3 -m venv .ci-meson
          .ci-meson/bin/python -m pip install --upgrade pip
          .ci-meson/bin/python -m pip install meson==1.11.1
          echo "$PWD/.ci-meson/bin" >> "$GITHUB_PATH"
          .ci-meson/bin/meson --version

      - name: Apply hook overlay
        env:
          KEA_CB_CMDS_SKIP_DOCS: "1"
        run: |
          hook/scripts/apply-overlay.sh kea

      - name: Configure upstream Kea overlay
        timeout-minutes: 10
        run: |
          meson setup kea/build-canary kea \
            --wrap-mode=nofallback \
            -Dtests=enabled \
            -Dcpp_std=c++17 \
            -Dcrypto=openssl \
            -Dkrb5=disabled \
            -Dmysql=disabled \
            -Dnetconf=disabled \
            -Dpostgresql=enabled

      - name: Build hook, tests, and conformance runtime
        timeout-minutes: 30
        run: |
          meson compile -C kea/build-canary \
            dhcp-cb-cmds-tests \
            dhcp-cb-cmds-libload-tests \
            src/hooks/dhcp/cb_cmds/dhcp_cb_cmds.so \
            src/hooks/dhcp/pgsql/dhcp_pgsql.so \
            kea-dhcp4 \
            kea-dhcp6

      - name: Run overlay unit and API tests
        timeout-minutes: 10
        run: |
          meson test -C kea/build-canary \
            dhcp-cb-cmds-tests \
            dhcp-cb-cmds-libload-tests \
            dhcp-cb-cmds-api-coverage \
            kea-config-backend-tests \
            --print-errorlogs

      - name: Initialize PostgreSQL config backend
        env:
          PGPASSWORD: kea
        run: |
          kea/build-canary/src/bin/admin/kea-admin db-init pgsql \
            -h 127.0.0.1 \
            -P 5432 \
            -u kea \
            -p kea \
            -n kea \
            -d "$PWD/kea/build-canary/src/share/database/scripts"

      - name: Run ARM conformance harness
        timeout-minutes: 5
        env:
          CB_PG_HOST: 127.0.0.1
          CB_PG_PORT: "5432"
          CB_PG_NAME: kea
          CB_PG_USER: kea
          CB_PG_PASSWORD: kea
          KEA_BIN4: ${{ github.workspace }}/kea/build-canary/src/bin/dhcp4/kea-dhcp4
          KEA_BIN6: ${{ github.workspace }}/kea/build-canary/src/bin/dhcp6/kea-dhcp6
          KEA_HOOKS_DIR: ${{ github.workspace }}/kea/build-canary/src/hooks/dhcp/cb_cmds
        run: |
          ln -s "$PWD/kea/build-canary/src/hooks/dhcp/pgsql/libdhcp_pgsql.so" \
            "$PWD/kea/build-canary/src/hooks/dhcp/cb_cmds/libdhcp_pgsql.so"
          python3 hook/scripts/arm_conformance.py
