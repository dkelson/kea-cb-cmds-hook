name: upstream-kea-canary

on:
  schedule:
    - cron: '17 9 * * 3'
  workflow_dispatch:
    inputs:
      kea_repository:
        description: Kea repository to test against
        required: true
        default: isc-projects/kea
      kea_ref:
        description: Kea branch, tag, or commit to test against
        required: true
        default: master

permissions:
  contents: read
  issues: write

jobs:
  should-run:
    runs-on: ubuntu-latest
    outputs:
      run_canary: ${{ steps.guard.outputs.run_canary }}
    steps:
      - name: Skip scheduled canary while failure issue is open
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          CANARY_ISSUE_LABEL: upstream-kea-canary
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" != "schedule" ]; then
            echo "run_canary=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          open_issue_count=$(
            gh issue list \
              --state open \
              --label "$CANARY_ISSUE_LABEL" \
              --json number \
              --jq 'length'
          )
          if [ "$open_issue_count" -gt 0 ]; then
            echo "Open $CANARY_ISSUE_LABEL issue exists; skipping scheduled canary."
            echo "run_canary=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_canary=true" >> "$GITHUB_OUTPUT"
          fi

  canary:
    needs: should-run
    if: needs.should-run.outputs.run_canary == 'true'
    runs-on: ubuntu-latest
    env:
      KEA_REPOSITORY: ${{ inputs.kea_repository || 'isc-projects/kea' }}
      KEA_REF: ${{ inputs.kea_ref || 'master' }}
      CC: clang
      CXX: clang++
    steps:
      - name: Check out hook
        uses: actions/checkout@v6
        with:
          path: hook

      - name: Check out upstream Kea
        uses: actions/checkout@v6
        with:
          repository: ${{ env.KEA_REPOSITORY }}
          ref: ${{ env.KEA_REF }}
          path: kea

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            clang \
            flex \
            gawk \
            libboost-all-dev \
            libgtest-dev \
            libkrb5-dev \
            liblog4cplus-dev \
            libpq-dev \
            libssl-dev \
            ninja-build \
            pkg-config \
            postgresql \
            postgresql-client \
            python3-venv

      - name: Start PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -v ON_ERROR_STOP=1 -c "CREATE USER kea WITH PASSWORD 'kea';"
          sudo -u postgres psql -v ON_ERROR_STOP=1 -c "CREATE DATABASE kea OWNER kea;"
          pg_isready -h 127.0.0.1 -p 5432 -U kea -d kea

      - name: Install Meson
        run: |
          python3 -m venv .ci-meson
          .ci-meson/bin/python -m pip install --upgrade pip
          .ci-meson/bin/python -m pip install meson==1.11.1
          echo "$PWD/.ci-meson/bin" >> "$GITHUB_PATH"
          .ci-meson/bin/meson --version

      - name: Apply hook overlay
        env:
          KEA_CB_CMDS_SKIP_DOCS: "1"
        run: |
          hook/scripts/apply-overlay.sh kea

      - name: Configure upstream Kea overlay
        timeout-minutes: 10
        run: |
          meson setup kea/build-canary kea \
            --wrap-mode=nofallback \
            -Dtests=enabled \
            -Dcpp_std=c++17 \
            -Dcrypto=openssl \
            -Dkrb5=disabled \
            -Dmysql=disabled \
            -Dnetconf=disabled \
            -Dpostgresql=enabled

      - name: Build hook, tests, and conformance runtime
        timeout-minutes: 30
        run: |
          meson compile -C kea/build-canary \
            dhcp-cb-cmds-tests \
            dhcp-cb-cmds-libload-tests \
            src/hooks/dhcp/cb_cmds/dhcp_cb_cmds.so \
            src/hooks/dhcp/pgsql/dhcp_pgsql.so \
            kea-dhcp4 \
            kea-dhcp6

      - name: Run overlay unit and API tests
        timeout-minutes: 10
        run: |
          meson test -C kea/build-canary \
            dhcp-cb-cmds-tests \
            dhcp-cb-cmds-libload-tests \
            dhcp-cb-cmds-api-coverage \
            kea-config-backend-tests \
            --print-errorlogs

      - name: Initialize PostgreSQL config backend
        env:
          PGPASSWORD: kea
        run: |
          kea/build-canary/src/bin/admin/kea-admin db-init pgsql \
            -h 127.0.0.1 \
            -P 5432 \
            -u kea \
            -p kea \
            -n kea \
            -d "$PWD/kea/build-canary/src/share/database/scripts"

      - name: Run ARM conformance harness
        timeout-minutes: 5
        env:
          CB_PG_HOST: 127.0.0.1
          CB_PG_PORT: "5432"
          CB_PG_NAME: kea
          CB_PG_USER: kea
          CB_PG_PASSWORD: kea
          KEA_BIN4: ${{ github.workspace }}/kea/build-canary/src/bin/dhcp4/kea-dhcp4
          KEA_BIN6: ${{ github.workspace }}/kea/build-canary/src/bin/dhcp6/kea-dhcp6
          KEA_HOOKS_DIR: ${{ github.workspace }}/kea/build-canary/src/hooks/dhcp/cb_cmds
        run: |
          ln -s "$PWD/kea/build-canary/src/hooks/dhcp/pgsql/libdhcp_pgsql.so" \
            "$PWD/kea/build-canary/src/hooks/dhcp/cb_cmds/libdhcp_pgsql.so"
          python3 hook/scripts/arm_conformance.py

  report-failure:
    needs:
      - should-run
      - canary
    if: needs.should-run.outputs.run_canary == 'true' && needs.canary.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Open or update upstream canary issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          CANARY_ISSUE_LABEL: upstream-kea-canary
          KEA_REPOSITORY: ${{ inputs.kea_repository || 'isc-projects/kea' }}
          KEA_REF: ${{ inputs.kea_ref || 'master' }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh label create "$CANARY_ISSUE_LABEL" \
            --description "Upstream Kea canary failures" \
            --color D73A4A >/dev/null 2>&1 || true

          issue_body=$(mktemp)
          {
            echo "The upstream Kea canary failed."
            echo
            echo "- Workflow run: $RUN_URL"
            echo "- Kea repository: $KEA_REPOSITORY"
            echo "- Kea ref: $KEA_REF"
            echo "- Hook ref: $GITHUB_SHA"
            echo
            echo "Scheduled canary runs will skip while this issue remains open."
            echo "Close this issue after the hook has been updated or the upstream breakage is resolved."
          } > "$issue_body"

          existing_issue=$(
            gh issue list \
              --state open \
              --label "$CANARY_ISSUE_LABEL" \
              --json number \
              --jq '.[0].number // empty'
          )
          if [ -n "$existing_issue" ]; then
            gh issue comment "$existing_issue" --body-file "$issue_body"
          else
            gh issue create \
              --title "Upstream Kea canary failing" \
              --label "$CANARY_ISSUE_LABEL" \
              --body-file "$issue_body"
          fi
